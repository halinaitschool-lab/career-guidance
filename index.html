<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>

  <script>
    (function () {
      const userLang = navigator.language || navigator.userLanguage;

      if (!userLang) {
        window.location.replace('/ru/');
        return;
    }

      const lang = userLang.toLowerCase();

      if (lang.startsWith('pl')) {
        window.location.replace('/pl/');
      } else if (lang.startsWith('uk')) {
        window.location.replace('/ua/');
      } else {
        window.location.replace('/ru/');
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
