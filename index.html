<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>

  <script>
(function () {
  const isLocal = window.location.hostname === 'localhost' 
              || window.location.hostname === '127.0.0.1';

  const base = isLocal ? '/' : '/career-guidance/'; // 🔥 магія тут

  const userLang = navigator.language || navigator.userLanguage;

  if (!userLang) {
    window.location.replace(base + 'ru/');
    return;
  }

  const lang = userLang.toLowerCase();

  if (lang.startsWith('pl')) {
    window.location.replace(base + 'pl/');
  } else {
    window.location.replace(base + 'ru/');
  }
})();
</script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
