<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Redirecting...</title>

  <script>
(function () {
  const base = '/career-guidance/'; // 🔥 ВАЖЛИВО

  const userLang = navigator.language || navigator.userLanguage;

  if (!userLang) {
    window.location.replace(base + 'ru/');
    return;
  }

  const lang = userLang.toLowerCase();

  if (lang.startsWith('pl')) {
    window.location.replace(base + 'pl/');
  } else if (lang.startsWith('uk')) {
    window.location.replace(base + 'ua/');
  } else {
    window.location.replace(base + 'ru/');
  }
})();
</script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
